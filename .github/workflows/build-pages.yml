name: Publish immutable APR Explorer release

on:
  workflow_dispatch:
    inputs:
      release_id:
        description: Fixed data-vintage release id
        required: true
        default: 2018-2024

permissions:
  pages: write
  id-token: write

concurrency:
  group: pages-deploy-2018-2024
  cancel-in-progress: false

env:
  RELEASE_OWNER: ${{ vars.RELEASE_OWNER }}
  RELEASE_ID: 2018-2024
  TABLEA2_URL: https://data.ca.gov/dataset/81b0841f-2802-403e-b48e-2ef4b751f77c/resource/fe505d9b-8c36-42ba-ba30-08bc4f34e022/download/tablea2.csv
  PAGES_RANDOM_SEED: "20240618"

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Authorize owner and fixed release
        run: |
          test -n "$RELEASE_OWNER"
          test "${{ github.actor }}" = "$RELEASE_OWNER"
          test "${{ inputs.release_id }}" = "$RELEASE_ID"

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Refuse overwrite of deployed release
        run: test ! -e "docs/data/releases/$RELEASE_ID"

      - name: Fix reproducible build timestamp
        run: echo "SOURCE_DATE_EPOCH=$(git show -s --format=%ct HEAD)" >> "$GITHUB_ENV"

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11.14"
          cache: pip
          cache-dependency-path: requirements-pages-release.lock

      - name: Install dependencies
        run: |
          pip install --require-hashes --no-deps -r requirements-pages-release.lock
          pip check

      - name: Fetch owner-provided Zillow release inputs
        env:
          ZILLOW_INPUTS_URL: ${{ secrets.ZILLOW_INPUTS_URL }}
          ZILLOW_INPUTS_SHA256: ${{ secrets.ZILLOW_INPUTS_SHA256 }}
        run: |
          test -n "$ZILLOW_INPUTS_URL"
          test -n "$ZILLOW_INPUTS_SHA256"
          curl --fail --location --proto '=https' --tlsv1.2 --output "$RUNNER_TEMP/zillow-inputs.tar.gz" "$ZILLOW_INPUTS_URL"
          echo "$ZILLOW_INPUTS_SHA256  $RUNNER_TEMP/zillow-inputs.tar.gz" | sha256sum --check --strict
          mkdir -p "$RUNNER_TEMP/zillow-inputs"
          tar -xzf "$RUNNER_TEMP/zillow-inputs.tar.gz" -C "$RUNNER_TEMP/zillow-inputs"

      - name: Download and repair HCD APR data
        env:
          HCD_INPUT_SHA256: ${{ secrets.HCD_INPUT_SHA256 }}
        run: |
          test -n "$HCD_INPUT_SHA256"
          curl -fL -A "Mozilla/5.0 (APR Explorer release)" -o tablea2.csv "$TABLEA2_URL"
          echo "$HCD_INPUT_SHA256  tablea2.csv" | sha256sum --check --strict
          python tablea2_parsefilter_repair.py

      - name: Restore committed Census caches and boundaries
        env:
          PAGES_BUILD: "1"
        run: python scripts/bootstrap_pages_data.py

      - name: Build, verify, and promote staged release
        env:
          CI: "true"
          PAGES_BUILD: "1"
          IPUMS_API_KEY: ${{ secrets.IPUMS_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          ZILLOW_INPUT_DIR: ${{ runner.temp }}/zillow-inputs
        run: python scripts/export_pages_catalog.py --release-id "$RELEASE_ID" --staging-dir "$RUNNER_TEMP/$RELEASE_ID" --publish

      - name: Verify promoted release before publication
        run: python scripts/verify_pages_catalog.py "docs/data/releases/$RELEASE_ID"

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"

      - name: Install e2e dependencies
        run: npm ci --prefix e2e

      - name: Install Playwright Chromium
        run: npx --prefix e2e playwright install --with-deps chromium

      - name: Run explorer Playwright checks
        run: scripts/run_explorer_e2e.sh

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: docs

      - name: Deploy verified Pages artifact
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
